<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Dashboard | Go Stealth Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #00f5a0;
      --accent2: #00d9f5;
      --bg: #040812;
      --card-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #e0f0ea;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* Ambient Background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 80% 20%, rgba(0, 245, 160, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(0, 217, 245, 0.05) 0%, transparent 40%);
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo { width: 40px; height: 40px; }
    .brand h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--accent); }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      padding: 24px;
      border-radius: 20px;
      text-align: left;
    }
    
    .stat-label { font-size: 14px; color: #a0aec0; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: white; }
    .stat-trend { font-size: 12px; margin-top: 8px; color: var(--accent); }

    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .search-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 10px 20px;
      border-radius: 12px;
      width: 300px;
      font-family: inherit;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    
    th {
      text-align: left;
      padding: 16px;
      color: #a0aec0;
      font-weight: 500;
      border-bottom: 1px solid var(--glass-border);
    }
    
    td {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    
    .hwid { font-family: 'JetBrains Mono', monospace; color: var(--accent2); font-size: 12px; }
    .phone { font-family: 'JetBrains Mono', monospace; }
    
    .status-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-success { background: rgba(0, 245, 160, 0.1); color: var(--accent); border: 1px solid rgba(0, 245, 160, 0.2); }
    .status-pending { background: rgba(255, 179, 71, 0.1); color: #ffb347; border: 1px solid rgba(255, 179, 71, 0.2); }
    
    .action-btn {
      background: var(--accent);
      color: #040812;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }

    .logout-btn {
      background: transparent;
      border: 1px solid #ff4466;
      color: #ff4466;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <img src="riddletech-logo.png" alt="Logo" class="logo" />
        <h1>PAYMENT ADMIN</h1>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="total-revenue">$0</div>
        <div class="stat-trend" id="revenue-trend">↑ 0% this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Subscriptions</div>
        <div class="stat-value" id="active-subs">0</div>
        <div class="stat-trend" id="subs-trend">0 new today</div>
      </div>
      <div class="stat-card" style="grid-column: span 2;">
        <div class="stat-label">Manual Activation (Grant Access)</div>
        <div class="manual-form" style="display: flex; gap: 10px; margin-top: 10px;">
          <input type="text" id="manual-target-hwid" placeholder="Paste User Machine ID (HWID)..." style="flex:2; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; font-size: 13px;">
          <select id="manual-days" style="flex:1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; padding: 10px; border-radius: 8px; font-size: 13px;">
            <!-- Generated 1-100 days below -->
          </select>
          <button class="action-btn" onclick="generateKey()" style="padding: 0 20px;">Generate Key</button>
        </div>
        <div id="generated-key-display" style="margin-top: 15px; padding: 15px; background: rgba(0, 245, 160, 0.05); border: 1px dashed var(--accent); border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent); display:none; text-align: center;">
          <span style="color: #a0aec0; font-size: 11px; display: block; margin-bottom: 5px;">COPY AND SEND TO USER:</span>
          <strong id="key-value" style="font-size: 20px; letter-spacing: 2px;"></strong>
          <button class="action-btn" onclick="copyKey()" style="margin-left: 15px; background: transparent; border: 1px solid var(--accent); color: var(--accent);">Copy</button>
        </div>
      </div>
    </div>

    <div class="main-card">
      <div class="card-header">
        <h3>Subscription History (All)</h3>
        <input type="text" id="dashboard-search" class="search-box" placeholder="Search Machine ID..." onkeyup="filterTable()" />
      </div>
      
      <table id="sub-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Machine ID (HWID)</th>
            <th>Type</th>
            <th>Details</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="transaction-body">
          <!-- Data populated by script -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Simple Auth Guard
    if (!localStorage.getItem('admin_token')) {
      window.location.href = 'index.html';
    }

    function logout() {
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_password');
      window.location.href = 'index.html';
    }

    // Populate Days Dropdown (1-100)
    const daySelect = document.getElementById('manual-days');
    for (let i = 1; i <= 100; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${i} Day${i > 1 ? 's' : ''}`;
      daySelect.appendChild(opt);
    }
    // Add Lifetime option at the end
    const lifeOpt = document.createElement('option');
    lifeOpt.value = 36500;
    lifeOpt.textContent = 'Lifetime Access';
    daySelect.appendChild(lifeOpt);

    async function generateKey() {
      const days = document.getElementById('manual-days').value;
      const targetHwid = document.getElementById('manual-target-hwid').value.trim();
      
      if (!targetHwid) {
        alert("Please paste the User's Machine ID (HWID) first!");
        return;
      }

      let pass = localStorage.getItem('admin_password');
      if (!pass) {
        pass = prompt("Confirm Admin Password (saved for future key generations):");
        if (!pass) return;
        localStorage.setItem('admin_password', pass);
      }

      try {
        const res = await fetch('/api/admin/generate-key/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pass, days, targetHwid })
        });
        
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          const text = await res.text();
          throw new Error(`Server returned non-JSON response. Please ensure server.js is updated and restarted. Response: ${text.substring(0, 100)}`);
        }
        
        const data = await res.json();
        
        if (data.success) {
          document.getElementById('generated-key-display').style.display = 'block';
          document.getElementById('key-value').textContent = data.key;
        } else {
          alert("Failed. Check password or server.");
          localStorage.removeItem('admin_password'); // clear cached password if incorrect
        }
      } catch (err) {
        alert("Error generating key: " + err.message);
      }
    }

    function copyKey() {
      const val = document.getElementById('key-value').textContent;
      navigator.clipboard.writeText(val);
      alert("Key copied to clipboard!");
    }

    function filterTable() {
      const input = document.getElementById("dashboard-search");
      const filter = input.value.toUpperCase();
      const table = document.getElementById("sub-table");
      const tr = table.getElementsByTagName("tr");

      for (let i = 1; i < tr.length; i++) {
        const td = tr[i].getElementsByTagName("td")[1]; // Machine ID column
        if (td) {
          const txtValue = td.textContent || td.innerText;
          tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
        }
      }
    }

    async function loadData() {
      try {
        const transRes = await fetch('/api/admin/transactions/');
        const keysRes = await fetch('/api/admin/keys/');
        
        const contentTypeTrans = transRes.headers.get('content-type') || '';
        const contentTypeKeys = keysRes.headers.get('content-type') || '';
        
        if (!contentTypeTrans.includes('application/json') || !contentTypeKeys.includes('application/json')) {
          console.warn("Server returned non-JSON response for history data.");
          return;
        }
        
        const transactions = await transRes.json();
        const keys = await keysRes.json();
        
        const body = document.getElementById('transaction-body');
        body.innerHTML = '';
        
        // Add Transactions
        transactions.forEach(t => {
          const row = `<tr>
            <td>${new Date(t.date).toLocaleString()}</td>
            <td class="hwid">${t.hwid}</td>
            <td>Card / Crypto</td>
            <td>$ ${t.amount} (${t.plan})</td>
            <td><span class="status-badge status-${t.status.toLowerCase()}">${t.status}</span></td>
            <td><button class="action-btn" onclick="revokeAccess('${t.hwid}')" style="background:#ff4466;color:white">Revoke</button></td>
          </tr>`;
          body.innerHTML += row;
        });
        
        // Add Granted Keys
        keys.forEach(k => {
          const row = `<tr>
            <td>${new Date(k.createdAt).toLocaleString()}</td>
            <td class="hwid">${k.targetHwid}</td>
            <td>Granted</td>
            <td>${k.days} Days (${k.key})</td>
            <td><span class="status-badge status-success">${k.redeemedBy ? 'Activated' : 'Pending'}</span></td>
            <td><button class="action-btn" onclick="revokeAccess('${k.targetHwid}')" style="background:#ff4466;color:white">Revoke</button></td>
          </tr>`;
          body.innerHTML += row;
        });
      } catch (e) { console.error("Load failed", e); }
    }

    async function revokeAccess(hwid) {
      if (!confirm(`Are you sure you want to completely revoke access and clear all subscriptions/keys for Machine ID: ${hwid}?`)) {
        return;
      }
      
      const pass = localStorage.getItem('admin_password');
      if (!pass) {
        alert("Verification failed. Please generate a key or reload to prompt for password.");
        return;
      }

      try {
        const res = await fetch('/api/admin/revoke/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pass, hwid })
        });
        const data = await res.json();
        if (data.success) {
          alert(data.message);
          loadData();
        } else {
          alert("Revoke failed: " + data.error);
        }
      } catch (err) {
        alert("Error revoking access: " + err.message);
      }
    }

    loadData();
    setInterval(loadData, 30000); // Auto refresh every 30s
  </script>
</body>
</html>
